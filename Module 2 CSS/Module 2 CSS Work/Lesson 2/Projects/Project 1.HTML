<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> My Weather App Homepage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Plus+Jakarta+Sans:wght@700&family=Space+Grotesk:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Style.CSS" />
  </head>

  <body>
    <h1 class="f">My Weather App Homepage</h1>

    <div class="weather">
      <div class="sun-core"></div>
      <h1>Sydney</h1>
      <div class="e">Sunny</div>
      <h2>Current Temperature</h2>
      <div class="temperature">31°C</div>
    </div>

    <div class="weather-panel">
      <div class="location" id="location">Sydney, AU</div>
      <div class="date" id="date">Friday, 17 July</div>

      <div class="temperature">
        <span class="weather-icon"
          ><img
            src="../../../Module 2 CSS Work Assets/Lesson 2/Projects/sun (1).png"
          /> </span
        ><span id="temperature">31<sup class="d">°C</sup></span>
      </div>

      <div class="condition" id="condition">Sunny</div>

      <div class="details-grid">
        <div class="detail-item">
          <span class="detail-label">Wind</span>
          <span class="detail-value" id="wind">15 km/h</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Humidity</span>
          <span class="detail-value" id="humidity">64%</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Rain</span>
          <span class="detail-value" id="rain">0%</span>
        </div>
      </div>

      <div class="forecast-section">
        <div class="forecast-row">
          <span class="forecast-day">Sat</span>
          <span class="forecast-icon">☀️</span>
          <span class="forecast-temp">24° / 12°</span>
        </div>
        <div class="forecast-row">
          <span class="forecast-day">Sun</span>
          <span class="forecast-icon">⛅</span>
          <span class="forecast-temp">21° / 11°</span>
        </div>
        <div class="forecast-row">
          <span class="forecast-day">Mon</span>
          <span class="forecast-icon">🌧️</span>
          <span class="forecast-temp">17° / 9°</span>
        </div>
        <div class="forecast-row">
          <span class="forecast-day">Tue</span>
          <span class="forecast-icon">☁️</span>
          <span class="forecast-temp">19° / 10°</span>
        </div>
        <div class="forecast-row">
          <span class="forecast-day">Wed</span>
          <span class="forecast-icon">☀️</span>
          <span class="forecast-temp">22° / 11°</span>
        </div>
      </div>
    </div>
  </body>
</html>
